<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="100%" height="100%">
    <defs>
        <linearGradient id="grad-44" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#150b1a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#2b1836;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Spine Shadow & Background -->
    <rect width="300" height="450" fill="url(#grad-44)" />
    
    <!-- Spine 3D effect -->
    <rect x="0" y="0" width="18" height="450" fill="rgba(0,0,0,0.15)" />
    <line x1="18" y1="0" x2="18" y2="450" stroke="rgba(255,255,255,0.07)" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="450" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
    
    <!-- Geometric Graphic Art -->
    
        <!-- Perspective grids/labyrinth lines -->
        <line x1="50" y1="100" x2="250" y2="350" stroke="#b779f1" stroke-width="2" opacity="0.3" />
        <line x1="250" y1="100" x2="50" y2="350" stroke="#b779f1" stroke-width="2" opacity="0.3" />
        <rect x="75" y="150" width="150" height="150" fill="none" stroke="rgba(183, 121, 241, 0.4)" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
        <circle cx="150" cy="225" r="45" fill="none" stroke="#b779f1" stroke-width="1.5" opacity="0.6"/>
        <circle cx="150" cy="225" r="5" fill="#b779f1" opacity="0.9"/>
        <!-- Slits -->
        <path d="M 30 180 L 270 210" stroke="#150b1a" stroke-width="4" opacity="0.6"/>
        <path d="M 30 180 L 270 210" stroke="#b779f1" stroke-width="1" opacity="0.9"/>
        
    
    <!-- Inner Border Frame -->
    <rect x="15" y="15" width="270" height="420" rx="6" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
    
    <!-- Category (Top Header) -->
    <text x="150" y="60" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" letter-spacing="3" text-anchor="middle">GIZEM & GERILIM</text>
    
    <!-- Title Block -->
    <text x="150" y="225.0" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22px" font-weight="bold" letter-spacing="-0.5px">
        <tspan x="150" dy="0">Karanlık Labirent</tspan>
    </text>
    
    <!-- Brand / Publisher Logo imprint -->
    <g transform="translate(150, 360)">
        <circle cx="0" cy="0" r="8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <text x="0" y="3" fill="rgba(255,255,255,0.3)" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="800" text-anchor="middle">T</text>
    </g>
    
    <!-- Author Name (Bottom) -->
    <text x="150" y="395" fill="rgba(255,255,255,0.7)" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="12" font-weight="600" letter-spacing="0.5" text-anchor="middle">Ellen Blackwood</text>
</svg>