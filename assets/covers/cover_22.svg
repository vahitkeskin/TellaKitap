        <!-- Spiral core highlight node -->
        <circle cx="150" cy="230" r="3.5" fill="#ffffff" filter="url(#glow-philosophy)"/>
        
        <defs>
            <filter id="glow-philosophy" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="2" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
        
        
        <!-- Inner Decorative Border Frame -->
        <rect x="15" y="15" width="270" height="420" rx="6" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
        
        <!-- Dynamic Text Backing Shield -->
        
    <!-- Title Backing Glass Shield -->
    <rect x="35" y="192.5" width="230" height="65" rx="10" fill="rgba(0,0,0,0.45)" stroke="rgba(255,255,255,0.08)" stroke-width="1.25" backdrop-filter="blur(5px)" />
    
        
        <!-- Category (Top Header) -->
        <text x="150" y="52" fill="rgba(255,255,255,0.45)" font-family="system-ui, -apple-system, sans-serif" font-size="8.5" font-weight="800" letter-spacing="3" text-anchor="middle">FELSEFE</text>
        
        <!-- Title Block -->
        <text x="150" y="212.5" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="20px" font-weight="normal" letter-spacing="-0.5px" text-transform="none">
            <tspan x="150" dy="0">Antik Çağ</tspan><tspan x="150" dy="25px">Bilgeliği</tspan>
        </text>
        
        <!-- Brand / Publisher Logo Imprint -->
        <g transform="translate(150, 360)">
            <circle cx="0" cy="0" r="9" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.25"/>
            <text x="0" y="3" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="900" text-anchor="middle">T</text>
        </g>
        
        <!-- Author Name (Bottom) -->
        <text x="150" y="398" fill="rgba(255,255,255,0.75)" font-family="Georgia, serif" font-size="11.5" font-weight="600" letter-spacing="0.5" text-anchor="middle">Socrates Karahan</text>
    </g>
</svg>