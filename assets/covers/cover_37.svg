<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="100%" height="100%">
    <defs>
        <linearGradient id="grad-37" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#202f3d;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#385066;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Spine Shadow & Background -->
    <rect width="300" height="450" fill="url(#grad-37)" />
    
    <!-- Spine 3D effect -->
    <rect x="0" y="0" width="18" height="450" fill="rgba(0,0,0,0.15)" />
    <line x1="18" y1="0" x2="18" y2="450" stroke="rgba(255,255,255,0.07)" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="450" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
    
    <!-- Geometric Graphic Art -->
    
        <!-- Wavy hills -->
        <path d="M 30 250 C 70 230, 110 270, 150 250 C 190 230, 230 270, 270 250" fill="none" stroke="#ebf4fa" stroke-width="1" opacity="0.6"/>
        <path d="M 30 270 C 80 250, 120 290, 150 270 C 180 250, 220 290, 270 270" fill="none" stroke="rgba(235, 244, 250, 0.4)" stroke-width="1" opacity="0.4"/>
        <!-- Abstract leaf shape -->
        <path d="M 150 170 Q 180 200 150 230 Q 120 200 150 170 Z" fill="none" stroke="#ebf4fa" stroke-width="1.5" opacity="0.8" />
        <line x1="150" y1="170" x2="150" y2="230" stroke="#ebf4fa" stroke-width="1" opacity="0.5"/>
        <!-- Tiny Sun/Moon -->
        <circle cx="150" cy="130" r="15" fill="none" stroke="#ebf4fa" stroke-width="1" opacity="0.7"/>
        <circle cx="145" cy="127" r="10" fill="#202f3d" />
        
    
    <!-- Inner Border Frame -->
    <rect x="15" y="15" width="270" height="420" rx="6" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
    
    <!-- Category (Top Header) -->
    <text x="150" y="60" fill="rgba(255,255,255,0.4)" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" letter-spacing="3" text-anchor="middle">DOĞA & ŞIIR</text>
    
    <!-- Title Block -->
    <text x="150" y="225.0" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="22px" font-weight="600" letter-spacing="-0.5px">
        <tspan x="150" dy="0">Denizin Şarkısı</tspan>
    </text>
    
    <!-- Brand / Publisher Logo imprint -->
    <g transform="translate(150, 360)">
        <circle cx="0" cy="0" r="8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
        <text x="0" y="3" fill="rgba(255,255,255,0.3)" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="800" text-anchor="middle">T</text>
    </g>
    
    <!-- Author Name (Bottom) -->
    <text x="150" y="395" fill="rgba(255,255,255,0.7)" font-family="Georgia, serif" font-size="12" font-weight="600" letter-spacing="0.5" text-anchor="middle">Marcus Thorne</text>
</svg>